name: Test Role

on:
  push:
    branches: [feature/backend/Cognito-JWT]

permissions:
  id-token: write
  contents: read

concurrency:
  group: test-role-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test Assume Role
    runs-on: ubuntu-latest
    env:
      TF_VAR_kms_key_id: ${{ secrets.KMS_KEY_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_ROLE_ARN }}
          aws-region: us-east-1

      - name: Print assumed identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: infra
        run: terraform init -input=false

      - name: Terraform import CloudFront distribution
        working-directory: infra
        run: terraform import 'module.cloudfront.aws_cloudfront_distribution.iam_dashboard' E1ASA8I59U9PNG


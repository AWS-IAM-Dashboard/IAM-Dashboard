# DevSecOps/.gitleaks.toml - Optimized for IAM Dashboard
[gitleaks]
# Use specific rules instead of all rules to reduce false positives
enable-all-rules = false

# Exclude patterns for common false positives
exclude-patterns = [
    "*.md",
    "*.txt", 
    "*.log",
    "*.json",
    "*.yml",
    "*.yaml",
    "node_modules/**",
    ".git/**",
    "vendor/**",
    "*.lock",
    "*.sum",
    "dist/**",
    "build/**",
    ".next/**",
    ".terraform/**",
    "*.tfstate",
    "*.tfplan",
    ".gitignore",
    "README.md",
    "env.example",
    "*.example",
    "docs/**",
    "DevSecOps/opa-policies/**",
    "docker-compose.yml",
    "config/grafana/provisioning/datasources/datasources.yml",
    "docs/SCANNERS.md",
    "DevSecOps/.gitleaks.toml"
]

# Exclude specific directories
exclude-dirs = [
    ".git",
    "node_modules",
    "vendor",
    "dist",
    "build",
    ".next",
    ".terraform",
    "logs",
    "data",
    "docs",
    "DevSecOps/opa-policies"
]

# Exclude specific files
exclude-files = [
    "package-lock.json",
    "yarn.lock",
    "go.sum",
    "Pipfile.lock",
    "*.tfstate",
    "*.tfplan",
    "env.example",
    "README.md",
    "docs/**/*.md",
    "docker-compose.yml",
    "config/grafana/provisioning/datasources/datasources.yml",
    "docs/SCANNERS.md",
    "DevSecOps/.gitleaks.toml"
]

# Note: Do not add stopwords containing example keys (e.g. AKIAIOSFODNN7EXAMPLE).
# Gitleaks can flag this config file when those strings appear in it; use path-based
# allowlisting (e.g. [allowlist] paths) instead.

# Path-based allowlist: ignore findings in these paths (fixtures, SDK examples, mock data only)
[allowlist]
description = "Paths with non-sensitive example keys and mock data"
paths = [
  '''infra/lambda/botocore/.*''',
  '''infra/lambda/boto3/.*''',
  '''src/components/SecurityHub\.tsx''',
]

# Enable only essential security rules
[[rules]]
id = "aws-access-key"
description = "AWS Access Key"
regex = '''AKIA[0-9A-Z]{16}'''
tags = ["aws", "key"]

[[rules]]
id = "aws-secret-key"
description = "AWS Secret Key"
regex = '''(?i)aws_secret_access_key\s*=\s*['\"][A-Za-z0-9/+=]{40}['\"]'''
tags = ["aws", "secret"]

[[rules]]
id = "github-token"
description = "GitHub Token"
regex = '''ghp_[0-9a-zA-Z]{36}'''
tags = ["github", "token"]

[[rules]]
id = "jwt-token"
description = "JWT Token"
regex = '''eyJ[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*'''
tags = ["jwt", "token"]